name: CI-CD-Pipeline

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run unit tests
        run: mvn test

      - name: Package application
        run: mvn package -DskipTests

      - name: Build Docker image
        run: docker build -t quiz-app:test .

      # -------------------------
      # TRIVY FILESYSTEM SCAN
      # -------------------------

      - name: Run Trivy filesystem scan (generate SARIF)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload filesystem SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Enforce filesystem security gate
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      # -------------------------
      # TRIVY IMAGE SCAN
      # -------------------------

      - name: Run Trivy image scan (generate SARIF)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: quiz-app:test
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload image SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Enforce image security gate
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: quiz-app:test
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1


  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run unit tests
        run: mvn test

      - name: Package application
        run: mvn package -DskipTests

      - name: Build Docker image with SHA tag
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/quiz-app:${{ github.sha }} .

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Tag image as latest
        run: |
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/quiz-app:${{ github.sha }} \
                     ${{ secrets.DOCKER_HUB_USERNAME }}/quiz-app:latest

      - name: Push SHA tag
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/quiz-app:${{ github.sha }}

      - name: Push latest tag
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/quiz-app:latest
